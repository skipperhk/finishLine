<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | FINISH LINE</title>
    <link rel="stylesheet" href="output.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; }
        h1 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="text-white selection:bg-[#c9a84c] selection:text-black">
    <div class="flex items-center justify-center min-h-screen p-6">
        <div class="bg-neutral-950 border border-white/5 p-12 rounded-sm shadow-2xl w-full max-w-md">
            <h1 class="text-4xl text-[#c9a84c] font-bold mb-8 text-center italic">Welcome Back</h1>
            <form id="login-form">
                <label for="email" class="block text-[10px] uppercase tracking-[0.3em] font-bold text-neutral-500 mb-2">Account Email</label>
                <input type="email" id="email" name="email" required class="w-full bg-white/5 text-white p-4 rounded-sm mb-6 placeholder:text-neutral-700 border border-white/10 focus:outline-none focus:border-[#c9a84c]/50 transition-all">
                
                <label for="password" class="block text-[10px] uppercase tracking-[0.3em] font-bold text-neutral-500 mb-2">Secure Key</label>
                <div class="relative">
                    <input type="password" id="password" name="password" required class="w-full bg-white/5 text-white p-4 rounded-sm mb-8 placeholder:text-neutral-700 border border-white/10 focus:outline-none focus:border-[#c9a84c]/50 transition-all">
                    <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 flex items-center px-4 text-gray-500 hover:text-gray-300">
                        <svg id="eye-off" class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"/>
                        </svg>
                        <svg id="eye-on" class="h-4 w-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>  
                    </button>
                </div>
                <div id="error-message" style="display: none; color: red;"></div>
                <button type="submit" class="w-full bg-[#c9a84c] hover:bg-white text-black font-bold text-xs uppercase tracking-[0.2em] py-5 rounded-sm transition-all duration-300">Authorize</button>
            </form>
            <p class="mt-8 text-center text-[10px] uppercase tracking-widest text-neutral-500">
                Not a member? <a href="signup.html" class="text-[#c9a84c] hover:text-white transition-colors ml-2">Register Collective</a>
            </p>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
